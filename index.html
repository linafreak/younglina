<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Younglina — Music</title>
    <style>
        body {
            margin: 0;
            background: #0d0d0d;
            color: white;
            font-family: Arial, sans-serif;
        }
        header {
            padding: 40px;
            text-align: center;
            background: linear-gradient(90deg, #ff5500, #ff8800);
        }
        header h1 {
            font-size: 48px;
            margin: 0;
        }
        header p {
            font-size: 18px;
            opacity: 0.9;
        }
        .track-list {
            max-width: 800px;
            margin: 40px auto;
            padding: 0 20px;
        }
        .track {
            background: #1a1a1a;
            padding: 20px;
            margin-bottom: 20px;
            border-radius: 10px;
        }
        .track h3 {
            margin: 0 0 10px 0;
        }
        audio {
            width: 100%;
            margin-top: 10px;
        }
    </style>
</head>
<body>

<header>
    <h1>Younglina</h1>
    <p>Official Music Page — SoundCloud Style</p>
</header>

<div class="track-list">

    <div class="track">
        <h3>unki — Track 1</h3>
        <audio controls>
            <source src="music/unki1.mp3" type="audio/mpeg">
        </audio>
    </div>

    <div class="track">
        <h3>unki — Track 2</h3>
        <audio controls>
            <source src="music/unki2.mp3" type="audio/mpeg">
        </audio>
    </div>

    <div class="track">
        <h3>unki — Track 3</h3>
        <audio controls>
            <source src="music/unki3.mp3" type="audio/mpeg">
        </audio>
    </div>

</div>

</body>
</html>
